# do not modify these
root: ./
name: simulation
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
pre_window:
  - export UAV_NAME=uav1
  - export RUN_TYPE=simulation
  - export UAV_TYPE=f450
  - export PLATFORM_CONFIG=/home/cyrosrobot5/drone_ws/src/mrs_uav_gazebo_simulator/config/mrs_uav_system/f450.yaml
  - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  - export USE_SIM_TIME="true"
  - export GZ_SIM_MODEL_PATH=$GZ_SIM_MODEL_PATH:$HOME/drone_ws/src/arena_2025_desenho:/home/cyrosrobot5/drone_ws/src/mrs_uav_gazebo_simulator/models/mrs_robot_description/sdf/drones
  - export GZ_SIM_RESOURCE_PATH=$GZ_SIM_RESOURCE_PATH:$HOME/drone_ws/src/arena_2025_desenho

startup_window: status
windows:
  - zenoh_router:
      layout: tiled
      panes:
        - ros2 run rmw_zenoh_cpp rmw_zenohd
  - gazebo:
      layout: tiled
      panes:                                                        # world_file:=/home/cyrosrobot5/drone_ws/src/arena_2025_desenho/my_arena.world
        - ros2 launch mrs_uav_gazebo_simulator simulation.launch.py gz_headless:=false gz_verbose:=true
        - |
          waitForGazebo; sleep 5; ros2 service call /mrs_drone_spawner/spawn mrs_msgs/srv/String "{value: '1 --$UAV_TYPE --enable-rangefinder --enable-ground-truth --enable-bluefox-camera-down --enable-realsense-front --enable-ouster model:=OS0-32 horizontal_samples:=128 update_rate:=10'}"
  - px4_api:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_px4_api api.launch.py
